services:
  gateway:
    build: ./gateway
    container_name: gateway
    environment:
      PORT: 8080
      REPLICA_URLS: http://replica1:9001,http://replica2:9002,http://replica3:9003
    ports:
      - "8080:8080"
    volumes:
      - ./gateway:/app
      - /app/node_modules
    depends_on:
      - replica1
      - replica2
      - replica3
    networks:
      - mini-raft-net

  replica1:
    build: ./replica1
    container_name: replica1
    environment:
      REPLICA_ID: replica1
      PORT: 9001
      SELF_URL: http://replica1:9001
      GATEWAY_URL: http://gateway:8080
      PEERS: replica1=http://replica1:9001,replica2=http://replica2:9002,replica3=http://replica3:9003
      ELECTION_MIN_MS: 500
      ELECTION_MAX_MS: 800
      HEARTBEAT_MS: 150
    ports:
      - "9001:9001"
    volumes:
      - ./replica1:/app
      - /app/node_modules
    networks:
      - mini-raft-net

  replica2:
    build: ./replica2
    container_name: replica2
    environment:
      REPLICA_ID: replica2
      PORT: 9002
      SELF_URL: http://replica2:9002
      GATEWAY_URL: http://gateway:8080
      PEERS: replica1=http://replica1:9001,replica2=http://replica2:9002,replica3=http://replica3:9003
      ELECTION_MIN_MS: 500
      ELECTION_MAX_MS: 800
      HEARTBEAT_MS: 150
    ports:
      - "9002:9002"
    volumes:
      - ./replica2:/app
      - /app/node_modules
    networks:
      - mini-raft-net

  replica3:
    build: ./replica3
    container_name: replica3
    environment:
      REPLICA_ID: replica3
      PORT: 9003
      SELF_URL: http://replica3:9003
      GATEWAY_URL: http://gateway:8080
      PEERS: replica1=http://replica1:9001,replica2=http://replica2:9002,replica3=http://replica3:9003
      ELECTION_MIN_MS: 500
      ELECTION_MAX_MS: 800
      HEARTBEAT_MS: 150
    ports:
      - "9003:9003"
    volumes:
      - ./replica3:/app
      - /app/node_modules
    networks:
      - mini-raft-net

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - mini-raft-net

networks:
  mini-raft-net:
    driver: bridge
